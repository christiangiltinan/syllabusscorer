<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Papers - SyllabusScorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-sidebar: #f8fafc;
            --bg-viewer: #f1f5f9;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .sidebar h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            padding-left: 0.5rem;
        }

        .paper-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .paper-btn {
            background: white;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .paper-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .paper-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .paper-btn .badge {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            width: fit-content;
        }

        .paper-btn.active .badge {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Viewer Area */
        .viewer {
            flex: 1;
            background: var(--bg-viewer);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .iframe-container {
            width: 100%;
            height: 85vh;
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            overflow: hidden;
            display: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .placeholder svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="sidebar">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Past Papers
            </h1>

            <!-- 2014 Section -->
            <div class="section">
                <div class="section-title">2014 - Gaeilge</div>
                <div class="paper-group">
                    <button class="paper-btn" onclick="loadPaper('/past-papers/gaeilge/higherlevel.p1.2014.pdf', this)">
                        <span>Higher Level Paper 1</span>
                        <span class="badge" style="background: #fee2e2; color: #991b1b;">Higher</span>
                    </button>
                    <button class="paper-btn" onclick="loadPaper('/past-papers/gaeilge/higherlevel.p2.2014.pdf', this)">
                        <span>Higher Level Paper 2</span>
                        <span class="badge" style="background: #fee2e2; color: #991b1b;">Higher</span>
                    </button>
                    <button class="paper-btn" onclick="loadPaper('/past-papers/gaeilge/ordinarylevel.2014.pdf', this)">
                        <span>Ordinary Level</span>
                        <span class="badge" style="background: #fef9c3; color: #854d0e;">Ordinary</span>
                    </button>
                    <button class="paper-btn" onclick="loadPaper('/past-papers/gaeilge/foundationlevel.2014.pdf', this)">
                        <span>Foundation Level</span>
                        <span class="badge" style="background: #dcfce7; color: #166534;">Foundation</span>
                    </button>
                </div>
            </div>

            <!-- 2013 Section -->
            <div class="section">
                <div class="section-title">2013 - Gaeilge</div>
                <div class="paper-group">
                    <button class="paper-btn" onclick="loadPaper('/past-papers/gaeilge/higherlevel.p1.2013.pdf', this)">
                        <span>Higher Level Paper 1</span>
                        <span class="badge" style="background: #fee2e2; color: #991b1b;">Higher</span>
                    </button>
                    <button class="paper-btn" onclick="loadPaper('/past-papers/gaeilge/higherlevel.p2.2013.pdf', this)">
                        <span>Higher Level Paper 2</span>
                        <span class="badge" style="background: #fee2e2; color: #991b1b;">Higher</span>
                    </button>
                    <button class="paper-btn" onclick="loadPaper('/past-papers/gaeilge/ordinarylevel.2013.pdf', this)">
                        <span>Ordinary Level</span>
                        <span class="badge" style="background: #fef9c3; color: #854d0e;">Ordinary</span>
                    </button>
                    <button class="paper-btn" onclick="loadPaper('/past-papers/gaeilge/foundationlevel.2013.pdf', this)">
                        <span>Foundation Level</span>
                        <span class="badge" style="background: #dcfce7; color: #166534;">Foundation</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Viewer -->
        <main class="viewer">
            <div id="placeholder" class="placeholder">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                <p>Select a paper from the menu to start viewing.</p>
            </div>
            <div id="iframe-container" class="iframe-container">
                <iframe id="pdf-viewer" src=""></iframe>
            </div>
        </main>
    </div>

    <script>
        function loadPaper(url, btn) {
            // Update UI
            document.querySelectorAll('.paper-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Show iframe
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('iframe-container').style.display = 'block';

            // Load original PDF
            document.getElementById('pdf-viewer').src = url;
        }
    </script>
</body>
</html>
