<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Mastery | SyllabusScorer</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background: var(--bg-secondary); padding-top: 72px; }

        .study-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 40px; }

        .study-card {
            width: 100%; max-width: 540px; height: 420px; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }
        .study-card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 56px; text-align: center; border-radius: 32px; box-shadow: var(--shadow-card-hover);
            border: 1px solid var(--border-light); background: #fff;
        }
        .card-front { font-size: 1.8rem; font-weight: 800; line-height: 1.3; color: var(--text-primary); }
        .card-back { transform: rotateY(180deg); font-size: 1.5rem; border: 3.5px solid var(--brand-green); color: var(--text-primary); }

        /* BUTTONS */
        .controls-container { width: 100%; max-width: 540px; margin-top: 32px; min-height: 80px; display: flex; justify-content: center; }
        
        .btn-action {
            padding: 18px 48px; border-radius: 16px; border: none; font-weight: 900; color: #fff; cursor: pointer;
            font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
            font-family: 'Outfit', sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        
        .btn-flip { background: #3B82F6; width: 100%; } /* Blue */
        .btn-correct { background: #10B981; flex: 1; } /* Green */
        .btn-incorrect { background: #EF4444; flex: 1; } /* Red */

        .grading-group { display: none; gap: 16px; width: 100%; }
        .grading-group.visible { display: flex; }

        .progress-bar { position: fixed; top: 72px; height: 5px; background: var(--brand-green); transition: width 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); z-index: 2000; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

        .edit-footer {
            padding: 24px; text-align: center; border-top: 1px solid var(--border-light);
            background: #fff; width: 100%; display: flex; justify-content: center;
        }
        .edit-link {
            text-decoration: none; font-size: 0.9rem; font-weight: 800; color: var(--text-tertiary);
            transition: color 0.2s; border: 1px solid var(--border-light); padding: 10px 24px; border-radius: 50px;
        }
        .edit-link:hover { color: var(--text-primary); border-color: var(--text-primary); }
        /* ProStudy Dropdown */
        .pro-dropdown { position: relative; display: inline-block; cursor: pointer; }
        .pro-btn { color: var(--brand-green); font-weight: 800; display: flex; align-items: center; gap: 4px; padding: 10px 16px; min-width: 120px; }
        .pro-content { 
            display: none; position: absolute; top: 100%; left: 0; 
            background: #fff; min-width: 180px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border-light);
            padding: 8px; z-index: 2000; margin-top: 4px;
        }
        .pro-dropdown:hover .pro-content { display: block; animation: slideUp 0.2s ease; }
        .pro-content a { 
            display: block; padding: 12px 16px; border-radius: 10px;
            color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 700;
            transition: all 0.2s;
        }
        .pro-content a:hover { background: var(--bg-accent); color: var(--brand-green); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="nav-inner">
            <div class="logo-ss" onclick="location.href='index.html'">
                <span class="s-hilite">S</span>yllabus<span class="s-hilite">S</span>corer
            </div>
            <nav class="nav-links">
                <div class="pro-dropdown">
                    <div class="pro-btn">ProStudy <span style="font-size: 0.6rem;">▼</span></div>
                    <div class="pro-content">
                        <a href="dashboard.html">Free Cards</a>
                        <a href="plans.html">Paid Plans</a>
                    </div>
                </div>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="create.html" class="nav-link">Custom Cards</a>
                <a href="create_ai.html" class="nav-link" style="color: var(--brand-green); font-weight: 800;">AI Mode</a>
                <a href="dashboard.html" class="btn-primary" style="text-decoration: none; padding: 10px 20px; font-size: 0.9rem;">Exit</a>
            </nav>
        </div>
    </header>

    <div class="progress-bar" id="progress-line" style="width: 0%;"></div>

    <div class="study-container">
        <div style="margin-bottom: 24px; font-weight: 900; color: var(--text-tertiary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;" id="deck-info">BIOLOGY • A LEVEL</div>

        <div class="study-card" id="main-card">
            <div class="card-face card-front" id="text-front">Loading...</div>
            <div class="card-face card-back" id="text-back">Loading...</div>
        </div>

        <div class="controls-container">
            <button class="btn-action btn-flip" id="btn-flip" onclick="toggleFlip()">Flip & Reveal</button>
            <div class="grading-group" id="grading-group">
                <button class="btn-action btn-incorrect" onclick="grade(1)">Incorrect</button>
                <button class="btn-action btn-correct" onclick="grade(5)">Correct</button>
            </div>
        </div>

        <div style="margin-top: 24px; color: var(--text-tertiary); font-size: 0.85rem; font-weight: 600;" id="card-counter">Card 1 of 20</div>
    </div>

    <div class="edit-footer">
        <a id="edit-link" href="#" class="edit-link">Edit Flashcards</a>
    </div>

    <script src="js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const deckId = urlParams.get('id');
        let deck = SyllabusScorer.AppData.decks.find(d => d.id === deckId);
        let currentIndex = 0;

        function renderCard() {
            if (!deck) return;
            const card = deck.cards[currentIndex];
            const sub = SyllabusScorer.Utils.getSubject(deck.subject);
            
            document.getElementById('deck-info').textContent = `${sub.name} • ${deck.level}`;
            document.getElementById('text-front').textContent = card.front;
            document.getElementById('text-back').textContent = card.back;
            document.getElementById('card-counter').textContent = `Card ${currentIndex + 1} of ${deck.cards.length}`;
            document.getElementById('edit-link').href = `editor.html?id=${deck.id}`;
            
            // Stats & State
            document.getElementById('main-card').classList.remove('flipped');
            document.getElementById('btn-flip').style.display = 'block';
            document.getElementById('grading-group').classList.remove('visible');
            document.getElementById('progress-line').style.width = `${((currentIndex) / deck.cards.length) * 100}%`;
        }

        function toggleFlip() {
            document.getElementById('main-card').classList.toggle('flipped');
            document.getElementById('btn-flip').style.display = 'none';
            document.getElementById('grading-group').classList.add('visible');
        }

        function grade(q) {
            SyllabusScorer.AppData.recordResult(q >= 3);
            
            currentIndex++;
            if (currentIndex < deck.cards.length) {
                renderCard();
            } else {
                document.getElementById('progress-line').style.width = '100%';
                setTimeout(() => {
                    alert('Syllabus Mastery Complete: Deck finished.');
                    location.href = 'dashboard.html';
                }, 400);
            }
        }

        if (deck) {
            renderCard();
        } else {
            location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
